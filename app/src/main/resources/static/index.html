<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Clinic</title>

    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>

<body>
<div class="container">
    <div class="wrapper">

        <div id="header"></div>

        <main class="main-content">
            <h2 id="roleTitle">Select Your Role</h2>

            <button id="adminBtn" onclick="selectRole('ADMIN')">
                Admin
            </button>

            <button id="doctorBtn" onclick="selectRole('DOCTOR')">
                Doctor
            </button>

            <button id="patientBtn" onclick="selectRole('PATIENT')">
                Patient
            </button>
        </main>

        <div id="footer"></div>
    </div>
</div>

<div id="modal" class="modal">
    <span id="closeModal" class="close">&times;</span>
    <div id="modal-body"></div>
</div>

<script type="module" src="./js/services/index.js" defer></script>
</body>
</html>
